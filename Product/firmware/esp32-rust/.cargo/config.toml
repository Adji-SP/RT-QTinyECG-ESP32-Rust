# .cargo/config.toml
# ===================
# Cargo configuration for ESP32-S3 bare-metal Rust builds.
#
# The `esp` Xtensa Rust toolchain ships rust-src but NOT pre-built
# Xtensa target libs. We must pass -Zbuild-std to compile core
# from source. This is done via the [unstable] table.

[build]
target = "xtensa-esp32s3-none-elf"

# Build core + compiler_builtins from bundled rust-src.
# Required because the esp toolchain on Windows does not ship
# pre-compiled libs for xtensa-esp32s3-none-elf.
# Adds ~1-2 min to a clean build; subsequent builds are cached.
[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor --port COM16"
rustflags = [
    "-C", "link-arg=-Tlinkall.x",
]